<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Course — Edemy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/landing.css" />
    <link rel="stylesheet" href="/add-course.css" />
  </head>
  <body class="dashboard-page">
    <header class="dash-topbar">
      <div class="dash-topbar-inner">
        <a class="logo-link" href="/" aria-label="Edemy home">
          <svg class="logo-icon" width="40" height="40" viewBox="0 0 40 40" aria-hidden="true">
            <circle cx="20" cy="20" r="20" fill="#2563eb" />
            <path fill="#fff" d="M22 10 L14 22 h5l-1 8 10-14h-6l2-6z" />
          </svg>
          Edemy
        </a>
        <div class="dash-user-wrap">
          <button
            type="button"
            class="dash-user-trigger"
            id="user-menu-trigger"
            aria-expanded="false"
            aria-haspopup="true"
            aria-controls="user-menu-dropdown"
          >
            <span class="dash-user-greeting">Hi Richard</span>
            <svg class="dash-user-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="9" r="4" stroke="currentColor" stroke-width="2" />
              <path
                d="M5 20c1.5-4 5.5-6 7-6s5.5 2 7 6"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
          <div class="dash-user-dropdown" id="user-menu-dropdown" role="menu" hidden>
            <a href="#" role="menuitem">My Profile</a>
            <a href="#" role="menuitem">Logout</a>
          </div>
        </div>
      </div>
    </header>

    <div class="dash-shell">
      <aside class="dash-sidebar" aria-label="Dashboard navigation">
        <nav class="dash-nav">
          <a class="dash-nav-link" href="#">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M4 10.5L12 4l8 6.5V20a1 1 0 01-1 1h-5v-6H10v6H5a1 1 0 01-1-1v-9.5z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linejoin="round"
              />
            </svg>
            Dashboard
          </a>
          <a class="dash-nav-link is-active" href="/add-course.html" aria-current="page">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2" />
              <path d="M12 8v8M8 12h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            Add Course
          </a>
          <a class="dash-nav-link" href="/courses.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="3" y="4" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2" />
              <path d="M8 20h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            My Courses
          </a>
          <a class="dash-nav-link" href="#">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="8" r="3" stroke="currentColor" stroke-width="2" />
              <path
                d="M6 20c0-3.5 2.5-6 6-6s6 2.5 6 6"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
            Student Enrolled
          </a>
        </nav>
      </aside>

      <div class="dash-main-column">
        <main class="dash-main">
          <h1 class="dash-page-title">Add Course</h1>
          <p id="add-course-status" class="add-course-status" role="status" aria-live="polite"></p>
          <form id="add-course-form" class="add-course-form" novalidate>
            <div class="form-field">
              <label for="course-title">Course Title</label>
              <input id="course-title" name="courseName" type="text" placeholder="Type here" required maxlength="150" />
            </div>
            <div class="form-field">
              <label for="course-headings">Course Headings</label>
              <input id="course-headings" name="structure" type="text" placeholder="Type here" />
            </div>
            <div class="form-field">
              <label for="course-description">Course Description</label>
              <textarea id="course-description" name="description" rows="5" placeholder="Type here"></textarea>
            </div>
            <div class="form-field">
              <label for="course-teacher">Instructor</label>
              <select id="course-teacher" name="teacher" required aria-describedby="teacher-hint">
                <option value="">Select a teacher</option>
              </select>
              <span id="teacher-hint" class="field-hint">Required to create the course in the database.</span>
            </div>
            <div class="form-row-price-thumb">
              <div class="form-field form-field-price">
                <label for="course-price">Course Price</label>
                <input id="course-price" name="fee" type="number" placeholder="0" min="0" step="0.01" required />
              </div>
              <div class="form-field form-field-thumb">
                <span class="label-text" id="thumb-label">Course Thumbnail</span>
                <div class="thumb-row">
                  <input
                    type="file"
                    id="course-thumbnail-file"
                    name="thumbnailFile"
                    accept="image/*"
                    class="visually-hidden"
                    aria-labelledby="thumb-label"
                  />
                  <button type="button" class="btn-thumb-upload" id="thumb-upload-btn" aria-label="Upload thumbnail">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path
                        d="M12 16V8m0 0l-3 3m3-3l3 3M4 16.8V19a1 1 0 001 1h14a1 1 0 001-1v-2.2"
                        stroke="#fff"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                      <path
                        d="M4 12.8l4.5-5a2 2 0 012.8 0L16 14l2.2-2.2a2 2 0 012.8 0L22 14"
                        stroke="#fff"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                  </button>
                  <div class="thumb-preview-wrap">
                    <img id="thumb-preview" class="thumb-preview" alt="" width="120" height="72" hidden />
                  </div>
                </div>
                <label class="thumb-url-label" for="course-thumbnail-url">Or image URL</label>
                <input
                  id="course-thumbnail-url"
                  name="thumbnailUrl"
                  type="url"
                  placeholder="https://…"
                  class="thumb-url-input"
                />
              </div>
            </div>
            <button type="submit" class="btn-add-course">ADD</button>
          </form>
        </main>

        <footer class="dash-footer">
          <div class="dash-footer-inner">
            <div class="dash-footer-brand">
              <a class="logo-link logo-link-sm" href="/" aria-label="Edemy home">
                <svg class="logo-icon" width="32" height="32" viewBox="0 0 40 40" aria-hidden="true">
                  <circle cx="20" cy="20" r="20" fill="#2563eb" />
                  <path fill="#fff" d="M22 10 L14 22 h5l-1 8 10-14h-6l2-6z" />
                </svg>
                Edemy
              </a>
              <p>All right reserved. Copyright @Edemy.</p>
            </div>
            <div class="dash-footer-social" aria-label="Social links">
              <a class="social-circle" href="#" aria-label="Facebook">f</a>
              <a class="social-circle" href="#" aria-label="Twitter">𝕏</a>
              <a class="social-circle" href="#" aria-label="Instagram">◎</a>
            </div>
          </div>
        </footer>
      </div>
    </div>

    <script src="/add-course.js"></script>
  </body>
</html>
