<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Edemy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/landing.css" />
    <link rel="stylesheet" href="/add-course.css" />
    <link rel="stylesheet" href="/dashboard.css" />
  </head>
  <body class="dashboard-page">
    <header class="dash-topbar">
      <div class="dash-topbar-inner">
        <a class="logo-link" href="/" aria-label="Edemy home">
          <svg class="logo-icon" width="40" height="40" viewBox="0 0 40 40" aria-hidden="true">
            <circle cx="20" cy="20" r="20" fill="#2563eb" />
            <path fill="#fff" d="M22 10 L14 22 h5l-1 8 10-14h-6l2-6z" />
          </svg>
          Edemy
        </a>
        <div class="dash-user-wrap">
          <button
            type="button"
            class="dash-user-trigger"
            id="user-menu-trigger"
            aria-expanded="false"
            aria-haspopup="true"
            aria-controls="user-menu-dropdown"
          >
            <span class="dash-user-greeting">Hi Richard</span>
            <svg class="dash-user-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="9" r="4" stroke="currentColor" stroke-width="2" />
              <path
                d="M5 20c1.5-4 5.5-6 7-6s5.5 2 7 6"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
          <div class="dash-user-dropdown" id="user-menu-dropdown" role="menu" hidden>
            <a href="#" role="menuitem">My Profile</a>
            <a href="#" role="menuitem">Logout</a>
          </div>
        </div>
      </div>
    </header>

    <div class="dash-shell">
      <aside class="dash-sidebar" aria-label="Dashboard navigation">
        <nav class="dash-nav">
          <a class="dash-nav-link is-active" href="/dashboard.html" aria-current="page">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M4 10.5L12 4l8 6.5V20a1 1 0 01-1 1h-5v-6H10v6H5a1 1 0 01-1-1v-9.5z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linejoin="round"
              />
            </svg>
            Dashboard
          </a>
          <a class="dash-nav-link" href="/add-course.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2" />
              <path d="M12 8v8M8 12h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            Add Course
          </a>
          <a class="dash-nav-link" href="/courses.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="3" y="4" width="18" height="12" rx="2" stroke="currentColor" stroke-width="2" />
              <path d="M8 20h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            My Courses
          </a>
          <a class="dash-nav-link" href="/students-enrolled.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="8" r="3" stroke="currentColor" stroke-width="2" />
              <path
                d="M6 20c0-3.5 2.5-6 6-6s6 2.5 6 6"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
            Student Enrolled
          </a>
        </nav>
      </aside>

      <div class="dash-main-column">
        <main class="dash-main dash-main-wide">
          <h1 class="dash-page-title">Dashboard</h1>
          <p id="dashboard-status" class="dashboard-status" role="status" aria-live="polite"></p>

          <section class="dashboard-stats" aria-label="Instructor summary">
            <article class="metric-card">
              <div class="metric-icon" aria-hidden="true">👥</div>
              <div>
                <p class="metric-value" id="metric-enrollments">0</p>
                <p class="metric-label">Total Enrollments</p>
              </div>
            </article>
            <article class="metric-card">
              <div class="metric-icon" aria-hidden="true">📚</div>
              <div>
                <p class="metric-value" id="metric-courses">0</p>
                <p class="metric-label">Total Courses</p>
              </div>
            </article>
            <article class="metric-card">
              <div class="metric-icon" aria-hidden="true">$</div>
              <div>
                <p class="metric-value" id="metric-earnings">$0</p>
                <p class="metric-label">Total Earnings</p>
              </div>
            </article>
          </section>

          <section class="dashboard-table-section">
            <h2 class="dashboard-section-title">Latest Enrollments</h2>
            <div class="dashboard-table-wrap">
              <table class="dashboard-table">
                <thead>
                  <tr>
                    <th scope="col" class="col-num">#</th>
                    <th scope="col">Student Name</th>
                    <th scope="col">Course Title</th>
                    <th scope="col">Date</th>
                  </tr>
                </thead>
                <tbody id="dashboard-enrollments-tbody"></tbody>
              </table>
            </div>
          </section>
        </main>

        <footer class="dash-footer">
          <div class="dash-footer-inner">
            <div class="dash-footer-brand">
              <a class="logo-link logo-link-sm" href="/" aria-label="Edemy home">
                <svg class="logo-icon" width="32" height="32" viewBox="0 0 40 40" aria-hidden="true">
                  <circle cx="20" cy="20" r="20" fill="#2563eb" />
                  <path fill="#fff" d="M22 10 L14 22 h5l-1 8 10-14h-6l2-6z" />
                </svg>
                Edemy
              </a>
              <p>All right reserved. Copyright @Edemy.</p>
            </div>
            <div class="dash-footer-social" aria-label="Social links">
              <a class="social-circle" href="#" aria-label="Facebook">f</a>
              <a class="social-circle" href="#" aria-label="Twitter">X</a>
              <a class="social-circle" href="#" aria-label="Instagram">O</a>
            </div>
          </div>
        </footer>
      </div>
    </div>

    <script src="/dashboard.js"></script>
  </body>
</html>
